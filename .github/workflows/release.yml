name: Release

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-webos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ares-package
        run: |
          # Lekérjük a legfrissebb release pontos asset nevét a GitHub API-n keresztül
          ARES_URL=$(curl -s https://api.github.com/repos/webosbrew/ares-cli-rs/releases/latest \
            | grep "browser_download_url" \
            | grep "ares-package.*\.deb" \
            | cut -d '"' -f 4 \
            | head -1)
          echo "Downloading: $ARES_URL"
          curl -L "$ARES_URL" -o /tmp/ares-package.deb
          sudo apt install /tmp/ares-package.deb

      - name: Download webOS NDK
        run: |
          # Lekérjük a legfrissebb NDK asset pontos URL-jét
          NDK_URL=$(curl -s https://api.github.com/repos/openlgtv/buildroot-nc4/releases/latest \
            | grep "browser_download_url" \
            | grep "\.tar\.gz" \
            | cut -d '"' -f 4 \
            | head -1)
          echo "Downloading NDK: $NDK_URL"
          curl -L "$NDK_URL" -o /tmp/webos-sdk.tar.gz

      - name: Extract webOS NDK
        working-directory: /tmp
        run: |
          tar xzf webos-sdk.tar.gz
          # A kicsomagolt mappa neve változhat, megkeressük
          SDK_DIR=$(find /tmp -maxdepth 1 -type d -name "*sdk-buildroot*" | head -1)
          echo "SDK dir: $SDK_DIR"
          "$SDK_DIR/relocate-sdk.sh"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Build
        run: |
          TOOLCHAIN_FILE="$SDK_DIR/usr/share/buildroot/toolchainfile.cmake" \
          ./tools/webos/easy_build.sh -DCMAKE_BUILD_TYPE=$BUILD_TYPE

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ihsplay-webos
          path: dist/*.ipk
