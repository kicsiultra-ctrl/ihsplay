name: Release

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-webos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ares-package
        run: |
          ARES_URL=$(curl -s https://api.github.com/repos/webosbrew/ares-cli-rs/releases/latest \
            | grep "browser_download_url" \
            | grep "ares-package.*\.deb" \
            | cut -d '"' -f 4 \
            | head -1)
          curl -L "$ARES_URL" -o /tmp/ares-package.deb
          sudo apt install -y /tmp/ares-package.deb

      - name: Install qemu + aarch64 libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            qemu-user-static \
            binfmt-support \
            libc6-arm64-cross \
            libstdc++6-arm64-cross \
            libgcc-s1-arm64-cross
          sudo update-binfmts --enable qemu-aarch64
          sudo ln -sf /usr/aarch64-linux-gnu/lib/ld-linux-aarch64.so.1 /lib/ld-linux-aarch64.so.1 || true
          sudo ln -sf /usr/aarch64-linux-gnu/lib /lib/aarch64-linux-gnu || true

      - name: Download webOS NDK
        run: |
          NDK_URL=$(curl -s https://api.github.com/repos/openlgtv/buildroot-nc4/releases/latest \
            | grep "browser_download_url" \
            | grep "\.tar\.gz" \
            | cut -d '"' -f 4 \
            | head -1)
          echo "Downloading NDK: $NDK_URL"
          curl -L "$NDK_URL" -o /tmp/webos-sdk.tar.gz

      - name: Extract and relocate webOS NDK
        run: |
          cd /tmp
          tar xzf webos-sdk.tar.gz
          SDK_DIR=$(find /tmp -maxdepth 1 -type d \( -name "*sdk-buildroot*" -o -name "*sdk*buildroot*" \) | head -1)
          echo "Found SDK dir: $SDK_DIR"
          "$SDK_DIR/relocate-sdk.sh"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          SYSROOT=$(find "$SDK_DIR" -maxdepth 3 -type d -name "sysroot" | head -1)
          echo "SYSROOT=$SYSROOT" >> $GITHUB_ENV
          echo "Sysroot: $SYSROOT"
          # pbnjson keresése
          find "$SYSROOT" -name "pbnjson*" 2>/dev/null && echo "pbnjson FOUND" || echo "pbnjson NOT FOUND"
          # fake pbnjson.pc létrehozása ha nincs
          if ! find "$SYSROOT" -name "pbnjson_c.pc" 2>/dev/null | grep -q .; then
            echo "Creating fake pbnjson_c.pc..."
            mkdir -p "$SYSROOT/usr/lib/pkgconfig"
            cat > "$SYSROOT/usr/lib/pkgconfig/pbnjson_c.pc" << 'PKGEOF'
prefix=/usr
exec_prefix=${prefix}
libdir=${exec_prefix}/lib
includedir=${prefix}/include

Name: pbnjson_c
Description: pbnjson C library (stub for build)
Version: 1.0
Libs: -L${libdir} -lpbnjson_c
Cflags: -I${includedir}
PKGEOF
            # fake libpbnjson_c.so stub
            echo "void pbnjson_stub(){}" > /tmp/pbnjson_stub.c
            "$SDK_DIR/bin/arm-lgtv-linux-gnueabi-gcc" -shared -o "$SYSROOT/usr/lib/libpbnjson_c.so" /tmp/pbnjson_stub.c || true
            # fake header
            mkdir -p "$SYSROOT/usr/include"
            touch "$SYSROOT/usr/include/pbnjson.h"
          fi

      - name: Build
        run: |
          TOOLCHAIN_FILE=$(find "$SDK_DIR" -name "toolchainfile.cmake" | head -1)
          echo "Using toolchain: $TOOLCHAIN_FILE"
          TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
          ./tools/webos/easy_build.sh -DCMAKE_BUILD_TYPE=$BUILD_TYPE

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ihsplay-webos
          path: dist/*.ipk
