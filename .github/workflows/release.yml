name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-webos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies (ARM Emulation Fix)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-user-static binfmt-support libc6-arm64-cross libwayland-dev wayland-protocols pkg-config
          echo "QEMU_LD_PREFIX=/usr/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Install ares-package (CLI)
        run: |
          ARES_URL=$(curl -s https://api.github.com/repos/webosbrew/ares-cli-rs/releases/latest \
            | grep "browser_download_url" \
            | grep "ares-package.*\.deb" \
            | cut -d '"' -f 4 \
            | head -1)
          curl -L "$ARES_URL" -o /tmp/ares-package.deb
          sudo apt install -y /tmp/ares-package.deb

      - name: Download webOS NDK
        run: |
          NDK_URL=$(curl -s https://api.github.com/repos/openlgtv/buildroot-nc4/releases/latest \
            | grep "browser_download_url" \
            | grep "\.tar\.gz" \
            | cut -d '"' -f 4 \
            | head -1)
          curl -L "$NDK_URL" -o /tmp/webos-sdk.tar.gz

      - name: Extract and relocate webOS NDK
        run: |
          cd /tmp
          tar xzf webos-sdk.tar.gz
          SDK_DIR=$(find /tmp -maxdepth 1 -type d \( -name "*sdk-buildroot*" -o -name "*sdk*buildroot*" \) | head -1)
          "$SDK_DIR/relocate-sdk.sh"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          SYSROOT=$(find "$SDK_DIR" -maxdepth 3 -type d -name "sysroot" | head -1)
          echo "SYSROOT=$SYSROOT" >> $GITHUB_ENV
          
          if ! find "$SYSROOT" -name "pbnjson_c.pc" 2>/dev/null | grep -q .; then
            mkdir -p "$SYSROOT/usr/lib/pkgconfig"
            printf 'prefix=/usr\nexec_prefix=${prefix}\nlibdir=${exec_prefix}/lib\nincludedir=${prefix}/include\nName: pbnjson_c\nDescription: pbnjson stub\nVersion: 1.0\nLibs: -L${libdir} -lpbnjson_c\nCflags: -I${includedir}\n' > "$SYSROOT/usr/lib/pkgconfig/pbnjson_c.pc"
            echo "void pbnjson_stub(){}" > /tmp/pbnjson_stub.c
            "$SDK_DIR/bin/arm-lgtv-linux-gnueabi-gcc" -shared -o "$SYSROOT/usr/lib/libpbnjson_c.so" /tmp/pbnjson_stub.c || true
          fi

      - name: Configure and Patch External Projects
        run: |
          TOOLCHAIN_FILE=$(find "$SDK_DIR" -name "toolchainfile.cmake" | head -1)
          mkdir -p build
          
          # Első konfiguráció (WEBOS_ARCH=arm hozzáadva)
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
            -DTARGET_WEBOS=ON \
            -DWEBOS_ARCH=arm \
            -DOPUS_WITH_NEON=OFF \
            -DOPUS_USE_NEON=OFF \
            -DSDL_WAYLAND=ON \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE || true

          OPUS_SRC="build/ext_opus-prefix/src/ext_opus"
          if [ -d "$OPUS_SRC" ]; then
            echo "Hard-patching Opus for webOS ARM..."
            find "$OPUS_SRC" -name "*.h" -exec sed -i 's/#define OPUS_ARM_MAY_HAVE_NEON 1/#define OPUS_ARM_MAY_HAVE_NEON 0/g' {} +
            find "$OPUS_SRC" -name "*.h" -exec sed -i 's/#define OPUS_ARM_HAS_NEON 1/#define OPUS_ARM_HAS_NEON 0/g' {} +
            find build/ext_opus-prefix -name "*neon_intr.c" -delete
          fi

          # Második, végleges konfiguráció
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
            -DTARGET_WEBOS=ON \
            -DWEBOS_ARCH=arm \
            -DOPUS_WITH_NEON=OFF \
            -DOPUS_USE_NEON=OFF \
            -DSDL_WAYLAND=ON \
            -DSDL_VIDEO_DRIVER_WAYLAND=ON \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE

      - name: Build Project
        run: |
          cmake --build build --parallel $(nproc)

      - name: Package IPK
        run: |
          mkdir -p dist
          APP_PATH=$(find build -name "appinfo.json" -exec dirname {} \; | head -n 1)
          if [ -z "$APP_PATH" ]; then APP_PATH="build"; fi
          ares-package "$APP_PATH" -o dist/

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ihsplay-webos
          path: dist/*.ipk
