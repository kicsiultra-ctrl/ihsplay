name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types: [ created ]

env:
  BUILD_TYPE: Release

jobs:
  build-webos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download webOS NDK
        run: |
          cd /tmp
          NDK_URL=$(curl -s https://api.github.com/repos/openlgtv/buildroot-nc4/releases/latest | jq -r '.assets[] | select(.name | test("tar.gz")) | .browser_download_url' | head -1)
          echo "Downloading from: $NDK_URL"
          curl -L "$NDK_URL" -o webos-sdk.tar.gz
          tar xzf webos-sdk.tar.gz
          SDK_DIR=$(find /tmp -maxdepth 1 -type d -name "*buildroot*" | head -1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          "$SDK_DIR/relocate-sdk.sh"

      - name: Build with CMake
        env:
          TOOLCHAIN_FILE: ${{ env.SDK_DIR }}/usr/share/buildroot/toolchainfile.cmake
          CI: true
        run: |
          mkdir -p build
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN_FILE}" \
            -DTARGET_WEBOS=ON \
            -DBUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE
          cmake --build build --parallel $(nproc)

      - name: Create IPK package
        run: |
          cd build
          cpack

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ihsplay-webos
          path: build/*.ipk
